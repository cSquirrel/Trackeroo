# Overrides the real stack for the MCP integration tests so it never collides
# with a local dev stack: a dedicated host port and an isolated named volume
# (removed by `docker compose ... down -v`) instead of the ./data bind mount.
services:
  app:
    ports: !override
      - "8100:8000"
    volumes: !override
      - mcp-test-data:/app/data

volumes:
  mcp-test-data:
